name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      
      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Hikari-Tweaks v${{ steps.version.outputs.version }}"
          files: |
            build/libs/hikari-tweaks-${{ steps.version.outputs.version }}.jar
          generate_release_notes: true

